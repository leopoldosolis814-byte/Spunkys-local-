<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spunky's - Pizza Criolla</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden;
  }

  .container {
    width: 100vw;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .logo-overlay {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 20;
    width: 68px;
    height: 68px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid #e91e8c;
    box-shadow: 0 0 18px rgba(233,30,140,0.5);
  }

  .logo-overlay img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .bg-video {
    width: 100%;
    height: 46vh;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  .badge {
    background: #e91e8c;
    color: #fff;
    padding: 6px 16px;
    border-radius: 20px;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    align-self: center;
    margin-top: -13px;
    z-index: 10;
    white-space: nowrap;
    max-width: 92%;
    overflow: hidden;
    text-overflow: ellipsis;
    box-shadow: 0 4px 15px rgba(233,30,140,0.4);
  }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    align-items: center;
    text-align: center;
    padding: 8px 20px 20px;
  }

  .promo-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: #666;
    text-transform: uppercase;
  }

  .title {
    font-size: clamp(26px, 7vw, 36px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #fff;
    line-height: 1.1;
  }

  .price-box {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .old-price {
    color: #555;
    text-decoration: line-through;
    font-size: clamp(16px, 4vw, 20px);
    font-weight: 700;
  }

  .price {
    color: #FFD600;
    font-size: clamp(48px, 13vw, 64px);
    font-weight: 900;
    line-height: 1;
  }

  .pre-btn {
    font-size: 11px;
    color: #888;
    letter-spacing: 0.1em;
  }

  .btn {
    background: #25d366;
    color: #fff;
    text-decoration: none;
    padding: 16px;
    width: 90%;
    border-radius: 12px;
    font-weight: 900;
    font-size: clamp(15px, 4vw, 18px);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    box-shadow: 0 4px 20px rgba(37,211,102,0.4);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 4px 20px rgba(37,211,102,0.4); transform: scale(1); }
    50% { box-shadow: 0 4px 35px rgba(37,211,102,0.7); transform: scale(1.02); }
  }

  .extra {
    font-size: 11px;
    color: #555;
  }
</style>
</head>
<body>

<div class="container">

  <div class="logo-overlay">
    <img src="https://res.cloudinary.com/ds2udm1nc/image/upload/v1773810851/Copilot_20260316_044401_lubpbe.png" alt="Spunky's">
  </div>

  <video
    class="bg-video"
    src="https://res.cloudinary.com/ds2udm1nc/video/upload/v1773810500/20260318_244610450_yqdyfr.mp4"
    autoplay
    muted
    loop
    playsinline
  ></video>

  <div class="badge">Masa casera · Salsa de tomate · Muzza · Huevo · Morrones · Carne 🍕</div>

  <div class="content">

    <div class="promo-label">Destacada del menú</div>

    <div class="title">Pizza Criolla</div>

    <div class="price-box">
      <div class="old-price">$10.000</div>
      <div class="price">$9.500</div>
    </div>

    <div class="pre-btn">¡Pedí ahora y lo recibís rápido!</div>

    <a
      href="https://wa.me/5493794946552?text=Hola!%20Quiero%20la%20más%20pedida!%0APara%20enviar%20a%20/%20para%20retirar%3A%0AModo%20de%20pago%20(efectivo%2C%20transferencia)%3A%0AComentarios%20adicionales%3A"
      class="btn"
    >
      PEDIR AHORA 🍕
    </a>

    <div class="extra">Entrega rápida ⚡</div>

  </div>

</div>

</body>
</html>
