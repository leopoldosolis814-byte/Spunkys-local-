<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S2A Studio — Pack Estrenos</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root { 
    --bg: #07070f; --bg2: #0e0e1a; --fucsia: #ff2d78; --amarillo: #ffe600; 
    --blanco: #ffffff; --gris: #666680; --gris2: #333345;
    --cian: #00f2ff; /* Color llamativo para el link */
    --insta: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
  }
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--blanco); font-family: 'Nunito', sans-serif; min-height: 100vh; padding-bottom: 60px; }
  
  header { position: sticky; top: 0; z-index: 100; background: rgba(7,7,15,0.95); backdrop-filter: blur(15px); padding: 16px; border-bottom: 1px solid rgba(255,45,120,0.2); text-align: center; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 4px; }
  .logo em { color: var(--fucsia); font-style: normal; }

  .hero { padding: 30px 20px; text-align: center; }
  .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: 45px; line-height: 1; }
  .hero-title span { color: var(--amarillo); }

  .section-header { padding: 20px; cursor: pointer; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; }
  .section-title em { color: var(--fucsia); font-style: normal; }
  .section-body { display: none; padding: 10px; animation: fadeIn 0.3s ease forwards; }
  .section.open .section-body { display: block; }
  .section.open .chevron { transform: rotate(180deg); }
  .chevron { transition: 0.3s; color: var(--fucsia); }

  .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .item { background: var(--bg2); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); position: relative; }
  
  .thumb-wrap { position: relative; aspect-ratio: 9/16; background: #000; }
  .thumb { width: 100%; height: 100%; object-fit: cover; }
  .thumb-num { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); font-size: 10px; padding: 2px 6px; border-radius: 4px; font-family: 'Bebas Neue'; color: #fff; z-index: 2; }
  
  /* BOTONES */
  .item-foot { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
  
  .btn { 
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%; font-family: 'Bebas Neue', sans-serif; font-size: 13px; 
    padding: 10px 5px; border-radius: 8px; border: none; cursor: pointer; 
    text-decoration: none; color: white; letter-spacing: 1px; transition: 0.2s;
  }

  /* 1. Descargar */
  .btn-save { background: var(--fucsia); box-shadow: 0 4px 15px rgba(255,45,120,0.3); }
  
  /* 2. Enlace */
  .btn-link { background: var(--cian); color: #003a3d; }
  
  /* 3. Instagram */
  .btn-ig { background: var(--insta); }

  .btn:active { transform: scale(0.95); opacity: 0.8; }

  /* Bloqueo */
  .lock { position: absolute; inset: 0; background: rgba(7,7,15,0.85); z-index: 10; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
  .lock-txt { font-family: 'Bebas Neue'; color: var(--fucsia); font-size: 14px; letter-spacing: 2px; transform: rotate(-10deg); border: 2px solid var(--fucsia); padding: 5px 10px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header>
  <div class="logo">STORY<em>2</em>ACTION</div>
</header>

<div class="hero">
  <div class="hero-title">TU CONTENIDO <span>PREMIUM</span></div>
</div>

<div class="section" id="s-img">
  <div class="section-header" onclick="tog('s-img')">
    <div class="section-title">IMÁGENES <em>GANCHO</em></div>
    <div class="chevron">▼</div>
  </div>
  <div class="section-body"><div class="content-grid" id="gImg"></div></div>
</div>

<div class="section" id="s-vid">
  <div class="section-header" onclick="tog('s-vid')">
    <div class="section-title">VIDEOS <em>GANCHO</em></div>
    <div class="chevron">▼</div>
  </div>
  <div class="section-body"><div class="content-grid" id="gVid"></div></div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const linkGlobal = params.get('link') || 'tulocal.com';
  const activas = new Set((params.get('activas') || '').split(',').map(Number).filter(Boolean));

  const IMGS = [
    { id:1, src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263235/Gemini_Generated_Image_bruchsbruchsbruc_etzmgj.png" },
    { id:2, src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263237/Gemini_Generated_Image_ehiim7ehiim7ehii_i5crwt.png" },
    { id:3, src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263237/Gemini_Generated_Image_sbvguqsbvguqsbvg_vjubkz.png" },
    { id:4, src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263238/Copilot_20260315_233635_sbtrat.png" }
  ];

  const VIDS = [
    { id:13, src:"https://res.cloudinary.com/ds2udm1nc/video/upload/v1775616634/XRecorder_20260407_02_2_qlycjr.mp4" },
    { id:14, src:"https://res.cloudinary.com/ds2udm1nc/video/upload/v1775616610/XRecorder_20260407_03_2_gh4ml7.mp4" },
    { id:15, src:"https://res.cloudinary.com/ds2udm1nc/video/upload/v1775616560/XRecorder_20260407_04_2_zlmcw6.mp4" },
    { id:16, src:"https://res.cloudinary.com/ds2udm1nc/video/upload/v1775616525/XRecorder_20260407_05_2_h1r9sw.mp4" }
  ];

  function makeItem(it, isVid) {
    const on = activas.has(it.id);
    const label = (isVid ? 'VID ' : 'IMG ') + it.id;
    
    let media = isVid 
      ? `<video class="thumb" src="${it.src}" muted playsinline loop></video>` 
      : `<img class="thumb" src="${it.src}" loading="lazy">`;

    return `
    <div class="item">
      ${!on ? '<div class="lock"><div class="lock-txt">BLOQUEADO</div></div>' : ''}
      <div class="thumb-wrap">${media}<div class="thumb-num">${label}</div></div>
      <div class="item-foot">
        <a href="${it.src}" target="_blank" rel="noopener noreferrer" class="btn btn-save">⬇ GUARDAR CONTENIDO</a>
        
        <button onclick="copyL(this, '${linkGlobal}')" class="btn btn-link">🔗 COPIAR ENLACE</button>
        
        <a href="instagram://camera" class="btn btn-ig">📸 ABRIR INSTAGRAM</a>
      </div>
    </div>`;
  }

  function copyL(btn, txt) {
    navigator.clipboard.writeText(txt).then(() => {
      const old = btn.innerHTML;
      btn.innerHTML = "✅ ¡COPIADO!";
      setTimeout(() => btn.innerHTML = old, 2000);
    });
  }

  function tog(id) { document.getElementById(id).classList.toggle('open'); }

  function render() {
    const gI = document.getElementById('gImg'), gV = document.getElementById('gVid');
    IMGS.forEach(i => gI.innerHTML += makeItem(i, false));
    VIDS.forEach(v => gV.innerHTML += makeItem(v, true));
  }

  render();
</script>
</body>
</html>
